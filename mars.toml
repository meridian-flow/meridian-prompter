[package]
name = "meridian-prompter"
version = "0.1.0"
description = "Workflow for creating and improving LLM agents and skills from first principles — research-backed design principles, writers, reviewers, and testers."

[dependencies.meridian-base]
url = "https://github.com/meridian-flow/meridian-base"
skills = [
    "meridian-spawn",
]

[settings]
targets = [
    ".agents",
    ".claude",
]
models_cache_ttl_hours = 24

[models.opus]
harness = "claude"
description = "Strong coordination and creative work. Best for design exploration."
provider = "anthropic"
match = ["*opus*"]
exclude = ["*:*"]

[models.gpt]
harness = "codex"
description = "Strongest generalist. Best for review and verification."
provider = "openai"
match = ["gpt-5*"]
exclude = [
    "*codex*",
    "*-pro",
    "*-mini",
    "*-nano",
    "*-chat",
    "*-turbo",
]
